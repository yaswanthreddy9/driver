<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Driver App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#16a34a;color:white;padding:15px;text-align:center}

.container{padding:15px}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
width:100%;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

.stop{background:red}
</style>
</head>

<body>

<header>🚴 Driver Panel</header>

<div class="container">
<h3>Orders to Deliver</h3>
<div id="ordersList"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const config={
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
};

firebase.initializeApp(config);
const db=firebase.firestore();
const auth=firebase.auth();

/* LOGIN */
auth.onAuthStateChanged(user=>{
if(!user){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}
});

/* LOAD ORDERS */
db.collection("orders")
.where("status","==","out for delivery")
.onSnapshot(snap=>{

ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

ordersList.innerHTML+=`
<div class="card">
<b>Order:</b> ${doc.id.slice(0,6)}<br>
<b>Address:</b> ${o.address || "No address"}<br>

<button onclick="startDelivery('${doc.id}')">
Start Delivery
</button>

<button class="stop" onclick="completeDelivery('${doc.id}')">
Mark Delivered
</button>
</div>
`;
});

});

/* GPS */
let watchId=null;

function startDelivery(orderId){

keepScreenOn();

watchId = navigator.geolocation.watchPosition(pos=>{

db.collection("orders").doc(orderId).update({
location:{
lat: pos.coords.latitude,
lng: pos.coords.longitude
}
});

},{
enableHighAccuracy:true
});

alert("Tracking Started");
}

function completeDelivery(orderId){

if(watchId){
navigator.geolocation.clearWatch(watchId);
watchId=null;
}

db.collection("orders").doc(orderId).update({
status:"delivered"
});

alert("Delivery Completed");
}

/* KEEP SCREEN ON */
let wakeLock=null;

async function keepScreenOn(){
try{
wakeLock = await navigator.wakeLock.request('screen');
}catch(e){}
}

db.collection("orders")
.onSnapshot(snap=>{

ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

/* FILTER MANUALLY */
if(o.status !== "out for delivery") return;

ordersList.innerHTML+=`
<div class="card">
<b>Order:</b> ${doc.id.slice(0,6)}<br>
<b>Address:</b> ${o.address || "No address"}<br>

<button onclick="startDelivery('${doc.id}')">
Start Delivery
</button>

<button class="stop" onclick="completeDelivery('${doc.id}')">
Mark Delivered
</button>
</div>
`;
});

});  
</script>

</body>
</html>
