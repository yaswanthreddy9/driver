<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Driver App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin: 0; font-family: Arial; background: #f5f5f5; }
header { background: #16a34a; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }

.container { padding: 15px; }

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.card.active-tracking {
    border: 2px solid #16a34a;
    box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    width: 100%;
    background: #16a34a;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}

.stop { background: red; }
.btn-nav { background: #2563eb; margin-top: 0; }
.btn-reached { background: #f59e0b; margin-top: 0; }
</style>
</head>

<body>

<header>🚴 Driver Panel</header>

<div class="container">
    <h3>Out for Delivery</h3>
    <div id="ordersList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const config = {
    apiKey: "AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
    authDomain: "chicken-delivery-app-9e4f6.firebaseapp.com",
    projectId: "chicken-delivery-app-9e4f6"
};

firebase.initializeApp(config);
const db = firebase.firestore();
const auth = firebase.auth();

let watchId = null;
let activeOrderId = null; 
let orderReached = false; // Tracks if the driver has arrived

/* ================================
   LOGIN 
================================ */
auth.onAuthStateChanged(user => {
    if(!user){
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }
});

/* ================================
   LOAD ORDERS
================================ */
db.collection("orders")
  .where("status", "==", "out for delivery") 
  .onSnapshot(snap => {
      
      const ordersList = document.getElementById('ordersList');
      ordersList.innerHTML = "";

      if(snap.empty) {
          ordersList.innerHTML = "<p style='text-align:center; color:#666;'>No pending deliveries.</p>";
          return;
      }

      snap.forEach(doc => {
          let o = doc.data();
          let isTrackingThis = (activeOrderId === doc.id);

          // Calculate exactly where Google Maps needs to route the driver
          let destUrl = "";
          if (o.deliveryLocation && o.deliveryLocation.lat && o.deliveryLocation.lng) {
              // Exact GPS Coordinates
              destUrl = `https://www.google.com/maps/dir/?api=1&destination=${o.deliveryLocation.lat},${o.deliveryLocation.lng}`;
          } else {
              // Fallback to text address
              let safeAddress = encodeURIComponent(o.address).replace(/'/g, "%27");
              destUrl = `https://www.google.com/maps/dir/?api=1&destination=${safeAddress}`;
          }

          // Build the Dynamic Buttons based on the Driver's State
          let actionButtons = "";
          
          if (!isTrackingThis) {
              // State 1: Order Assigned (Not Started)
              actionButtons = `<button onclick="startDelivery('${doc.id}', '${destUrl}')">🚀 Start Delivery</button>`;
          } 
          else if (isTrackingThis && !orderReached) {
              // State 2: Driving to Customer
              actionButtons = `
              <div style="display:flex; gap:10px; margin-top:10px;">
                  <button class="btn-nav" onclick="window.open('${destUrl}', '_blank')">🗺️ Go To Map</button>
                  <button class="btn-reached" onclick="markReached('${doc.id}')">📍 Reached</button>
              </div>`;
          } 
          else if (isTrackingThis && orderReached) {
              // State 3: Arrived at Customer Location
              actionButtons = `<button class="stop" onclick="completeDelivery('${doc.id}')">✅ Mark Delivered</button>`;
          }

          // Build the Order Card
          ordersList.innerHTML += `
          <div class="card ${isTrackingThis ? 'active-tracking' : ''}">
              <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                  <b>Order: #${doc.id.slice(0,6).toUpperCase()}</b>
                  ${isTrackingThis ? '<span style="color:#16a34a; font-weight:bold;">● Active Trip</span>' : ''}
              </div>
              <div style="color:#555; font-size:14px; margin-bottom:8px;">
                  <b>Address:</b> ${o.address || "No address"}
              </div>
              
              ${actionButtons}
          </div>
          `;
      });
});

/* ================================
   START GPS & NAVIGATION
================================ */
function startDelivery(orderId, destUrl) {
    if(!navigator.geolocation){
        alert("GPS is not supported on this device");
        return;
    }

    if(watchId){ navigator.geolocation.clearWatch(watchId); }

    keepScreenOn();

    activeOrderId = orderId; 
    orderReached = false; // Reset reached state

    /* START BACKGROUND TRACKING FOR THE CUSTOMER */
    watchId = navigator.geolocation.watchPosition(pos => {
        db.collection("orders").doc(orderId).update({
            location: {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            }
        });
    }, err => {
        console.error("GPS Error:", err);
    }, {
        enableHighAccuracy: true, maximumAge: 0, timeout: 10000
    });
    
    // Force the screen to update with the new buttons
    db.collection("orders").doc(orderId).update({ trackingStartedAt: new Date() });

    // Open Native Google Maps App for turn-by-turn navigation!
    window.open(destUrl, '_blank');
}

/* ================================
   DRIVER REACHED CUSTOMER
================================ */
function markReached(orderId) {
    orderReached = true;
    
    // Trigger a minor DB update to force the UI to immediately show "Mark Delivered"
    db.collection("orders").doc(orderId).update({ driverReachedAt: new Date() });
}

/* ================================
   COMPLETE DELIVERY 
================================ */
function completeDelivery(orderId) {
    if(confirm("Are you sure you want to mark this order as Delivered?")) {
        
        if(watchId){
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        activeOrderId = null; 
        orderReached = false; 

        db.collection("orders").doc(orderId).update({
            status: "delivered"
        }).then(() => {
            alert("Delivery Completed! Great job.");
        });
    }
}

/* ================================
   KEEP SCREEN ON (WAKE LOCK)
================================ */
let wakeLock = null;

async function keepScreenOn() {
    if ('wakeLock' in navigator) {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            document.addEventListener('visibilitychange', async () => {
                if (wakeLock !== null && document.visibilityState === 'visible') {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            });
        } catch (err) {
            console.log("Wake Lock error:", err);
        }
    }
}
</script>

</body>
</html>
