<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Driver App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#16a34a;color:white;padding:15px;text-align:center}

.container{padding:15px}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
width:100%;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

.stop{background:red}
</style>
</head>

<body>

<header>🚴 Driver Panel</header>

<div class="container">
<h3>Out for Delivery Orders</h3>
<div id="ordersList"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const config={
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
};

firebase.initializeApp(config);
const db=firebase.firestore();
const auth=firebase.auth();

let watchId=null;
let currentOrder=null;

/* LOGIN */
auth.onAuthStateChanged(user=>{
if(!user){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
});

/* LOAD ORDERS */
db.collection("orders")
.onSnapshot(snap=>{

ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

/* ONLY OUT FOR DELIVERY */
if(o.status !== "out for delivery") return;

ordersList.innerHTML+=`
<div class="card">
<b>Order:</b> ${doc.id.slice(0,6)}<br>
<b>Address:</b> ${o.address || "No address"}<br>

<button onclick="startDelivery('${doc.id}')">
Start Delivery
</button>

<button class="stop" onclick="completeDelivery('${doc.id}')" disabled id="done-${doc.id}">
Mark Delivered
</button>
</div>
`;
});

});

/* START DELIVERY */
function startDelivery(orderId){

if(!navigator.geolocation){
alert("GPS not supported");
return;
}

/* STOP OLD TRACK */
if(watchId){
navigator.geolocation.clearWatch(watchId);
}

/* KEEP SCREEN ON */
keepScreenOn();

currentOrder = orderId;

/* START TRACKING */
watchId = navigator.geolocation.watchPosition(pos=>{

console.log("Sending location:", pos.coords.latitude, pos.coords.longitude);

db.collection("orders").doc(orderId).update({
location:{
lat: pos.coords.latitude,
lng: pos.coords.longitude
}
});

}, err=>{
console.log(err);
},{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
});

/* ENABLE DELIVER BUTTON */
document.getElementById("done-"+orderId).disabled = false;

alert("Tracking Started");
}

/* COMPLETE DELIVERY */
function completeDelivery(orderId){

if(watchId){
navigator.geolocation.clearWatch(watchId);
watchId=null;
}

db.collection("orders").doc(orderId).update({
status:"delivered"
});

alert("Delivery Completed");
}

/* KEEP SCREEN ON */
let wakeLock=null;

async function keepScreenOn(){
try{
wakeLock = await navigator.wakeLock.request('screen');
console.log("Screen ON");
}catch(e){
console.log(e);
}
}
</script>

</body>
</html>
